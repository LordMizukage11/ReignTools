<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Warcraft ORE Wound Tracker</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #0a0a0a;
        }

        /* --- THEME VARIABLES --- */
        .app-wrapper {
            min-height: 100vh;
            padding: 20px;
            transition: all 0.4s ease;
        }

        .theme-alliance {
            background: linear-gradient(135deg, #001b3a 0%, #003366 100%);
            --bg-panel: #002244;
            --bg-box: #001122;
            --text-main: #e0e6ed;
            --text-sub: #8ea4b8;
            --border-color: #004d99;
            --border-hover: #0074D9;
            --accent: #FFD700;
            --btn-text: #001122;
            --shock-color: #0074D9;
            --killing-color: #FFD700;
            --killing-text: #001122;
            --shock-text: #ffffff;
        }

        .theme-horde {
            background: linear-gradient(135deg, #1a1a1a 0%, #050505 100%);
            --bg-panel: #242424;
            --bg-box: #121212;
            --text-main: #f0e6d2; 
            --text-sub: #a89f91;
            --border-color: #8a0303; 
            --border-hover: #e32424; 
            --accent: #d32f2f; 
            --btn-text: #ffffff;
            --shock-color: #d4af37; 
            --killing-color: #d32f2f; 
            --killing-text: #ffffff;
            --shock-text: #1a1a1a;
        }
        
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: var(--bg-panel);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.6);
            border: 1px solid var(--border-color);
            transition: all 0.4s ease;
        }
        
        h1 {
            text-align: center;
            color: var(--accent);
            margin-bottom: 5px;
            font-size: 2.5em;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
        }
        
        .subtitle {
            text-align: center;
            color: var(--text-sub);
            margin-bottom: 25px;
            font-size: 1.1em;
        }

        /* --- THEME TOGGLE --- */
        .theme-toggle-container {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
            margin-bottom: 30px;
            background: var(--bg-box);
            padding: 15px;
            border-radius: 12px;
            border: 1px solid var(--border-color);
        }

        .theme-label {
            font-weight: bold;
            font-size: 1.2em;
            color: var(--text-sub);
            transition: color 0.3s;
        }

        .theme-label.active { color: var(--accent); }

        .switch {
            position: relative;
            display: inline-block;
            width: 60px;
            height: 34px;
        }

        .switch input { opacity: 0; width: 0; height: 0; }

        .slider {
            position: absolute;
            cursor: pointer;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: #004d99;
            transition: .4s;
        }

        .slider:before {
            position: absolute;
            content: "";
            height: 26px; width: 26px;
            left: 4px; bottom: 4px;
            background-color: white;
            transition: .4s;
        }

        input:checked + .slider { background-color: #8a0303; }
        input:checked + .slider:before { transform: translateX(26px); }
        .slider.round { border-radius: 34px; }
        .slider.round:before { border-radius: 50%; }

        /* --- NOTIFICATIONS --- */
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.02); }
            100% { transform: scale(1); }
        }

        .notification-banner {
            padding: 15px;
            margin-bottom: 25px;
            border-radius: 8px;
            text-align: center;
            font-weight: 800;
            font-size: 1.3em;
            text-transform: uppercase;
            letter-spacing: 2px;
            animation: pulse 2s infinite;
            box-shadow: 0 5px 15px rgba(0,0,0,0.4);
        }

        .banner-dead { background: #8b0000; color: white; border: 2px solid #ff0000; }
        .banner-ko { background: #d35400; color: white; border: 2px solid #e67e22; }
        .banner-penalty { background: #b8860b; color: white; border: 2px solid #ffd700; }

        /* --- UI ELEMENTS --- */
        .controls-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            background-color: var(--bg-box);
            padding: 15px;
            border-radius: 12px;
            border: 1px solid var(--border-color);
            flex-wrap: wrap;
            gap: 15px;
        }

        .controls-row label {
            color: var(--text-main);
            margin-right: 15px;
            font-size: 1.2em;
            font-weight: bold;
        }

        .controls-row select {
            padding: 10px 20px;
            border-radius: 8px;
            background: var(--bg-panel);
            color: var(--accent);
            border: 2px solid var(--accent);
            font-size: 1.1em;
            cursor: pointer;
            font-weight: bold;
        }

        .advantages-section {
            background-color: var(--bg-box);
            padding: 15px;
            border-radius: 12px;
            border: 1px solid var(--border-color);
            margin-bottom: 25px;
        }

        .advantages-section h3 {
            color: var(--text-main);
            margin-bottom: 10px;
            font-size: 1.1em;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .checkbox-group {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
        }

        .checkbox-label {
            color: var(--text-sub);
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            font-weight: bold;
            font-size: 1.1em;
        }

        .checkbox-label input {
            cursor: pointer;
            width: 18px;
            height: 18px;
            accent-color: var(--accent);
        }
        
        .hit-location {
            background: var(--bg-box);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 15px;
            border: 2px solid var(--border-color);
            transition: all 0.3s ease;
        }
        
        .hit-location:hover {
            border-color: var(--border-hover);
            transform: translateY(-2px);
        }

        .hit-location.crippled {
            border-color: var(--killing-color);
            background: rgba(211, 47, 47, 0.1);
        }
        
        .location-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }
        
        .location-name { font-size: 1.4em; font-weight: bold; color: var(--text-main); }
        .location-number { background: var(--accent); color: var(--btn-text); padding: 5px 15px; border-radius: 20px; font-weight: bold; }
        
        .crippled-warning { color: var(--killing-color); font-size: 0.8em; text-transform: uppercase; font-weight: bold; margin-left: 10px; letter-spacing: 1px; }
        
        .boxes { display: flex; gap: 8px; flex-wrap: wrap; }
        
        .box {
            width: 35px; height: 35px; border: 2px solid var(--border-color); background: var(--bg-panel);
            border-radius: 6px; cursor: pointer; transition: all 0.2s ease;
            display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 0.9em; color: var(--text-main);
        }
        
        .box:hover { transform: scale(1.1); border-color: var(--border-hover); }
        .box.filled.shock { background: var(--shock-color); border-color: var(--shock-color); color: var(--shock-text); }
        .box.filled.killing { background: var(--killing-color); border-color: var(--killing-color); color: var(--killing-text); }

        /* --- MODULES (Dice & Healing) --- */
        .module-card { background: var(--bg-box); border-radius: 15px; padding: 20px; margin-bottom: 25px; border: 1px solid var(--border-color); }
        .module-card h2, .module-card h3 { color: var(--accent); margin-bottom: 15px; text-align: center; }
        .input-section { display: flex; gap: 15px; justify-content: center; align-items: center; margin-bottom: 15px; flex-wrap: wrap; }
        .input-section label { color: var(--text-main); font-weight: 600; }
        .input-section input { width: 70px; padding: 8px; border: 2px solid var(--border-color); background: var(--bg-panel); color: var(--text-main); border-radius: 8px; font-size: 1.1em; text-align: center; font-weight: bold; }
        
        .action-btn { background: var(--accent); color: var(--btn-text); padding: 10px 30px; border: none; border-radius: 8px; font-size: 1.1em; font-weight: 700; cursor: pointer; transition: all 0.3s ease; text-transform: uppercase; }
        .action-btn:hover { transform: translateY(-2px); filter: brightness(1.2); }
        
        .all-dice { display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; margin-bottom: 15px; }
        .die { width: 45px; height: 45px; background: var(--bg-panel); border: 2px solid var(--border-color); border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 1.5em; font-weight: bold; color: var(--text-main); }
        .die.matched { background: var(--accent); border-color: var(--accent); color: var(--btn-text); transform: scale(1.1); }
        
        .matches-section { background: var(--bg-panel); border: 1px solid var(--border-color); border-radius: 10px; padding: 15px; text-align: center; }
        .match-result { display: inline-block; background: var(--accent); color: var(--btn-text); padding: 8px 15px; border-radius: 8px; margin: 5px; font-weight: bold; }
        .healing-result { display: inline-block; background: var(--bg-box); border: 2px solid var(--accent); color: var(--text-main); padding: 10px 15px; border-radius: 8px; margin: 5px; font-weight: bold; font-size: 0.95em; }

        /* --- LEGEND & CONTROLS --- */
        .legend { display: flex; justify-content: center; gap: 30px; margin-top: 20px; padding: 15px; background: var(--bg-box); border: 1px solid var(--border-color); border-radius: 10px; }
        .legend-item { display: flex; align-items: center; gap: 10px; color: var(--text-main); }
        .legend-box { width: 25px; height: 25px; border-radius: 4px; border: 2px solid; }
        .legend-box.shock { background: var(--shock-color); border-color: var(--shock-color); }
        .legend-box.killing { background: var(--killing-color); border-color: var(--killing-color); }
        
        .controls { display: flex; gap: 10px; margin-top: 30px; justify-content: center; }
        .controls button { padding: 12px 30px; border: none; border-radius: 8px; font-size: 1em; font-weight: 600; cursor: pointer; transition: all 0.3s ease; text-transform: uppercase; }
        .reset-btn { background: #ff4757; color: white; }
        .save-btn { background: var(--accent); color: var(--btn-text); }
        .load-btn { background: #9b7ec4; color: white; }
        .controls button:hover { transform: translateY(-2px); filter: brightness(1.1); }
        
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const baseHitboxes = { 'Head': 4, 'Torso': 10, 'Left Arm': 5, 'Right Arm': 5, 'Left Leg': 5, 'Right Leg': 5 };
        
        const raceModifiers = {
            'Human': {},
            'Dwarf': {},
            'Night Elf': { 'Head': -1, 'Torso': -1, 'Left Arm': -1, 'Right Arm': -1, 'Left Leg': -1, 'Right Leg': -1 },
            'Gnome': { 'Head': -1, 'Torso': -1, 'Left Arm': -1, 'Right Arm': -1, 'Left Leg': -1, 'Right Leg': -1 },
            'Pandaren': {},
            'Orc': { 'Head': 2, 'Torso': 1, 'Left Arm': 1, 'Right Arm': 1, 'Left Leg': 1, 'Right Leg': 1 },
            'Goblin': { 'Head': -1, 'Torso': -1, 'Left Arm': -1, 'Right Arm': -1, 'Left Leg': -1, 'Right Leg': -1 },
            'Tauren': {},
            'Forsaken': {},
            'Blood Elf': {}
        };

        const advantageModifiers = {
            'Thick Headed': { 'Head': 1 },
            'Tough': { 'Torso': 1 },
            'Large': { 'Head': 1, 'Torso': 1, 'Left Arm': 1, 'Right Arm': 1, 'Left Leg': 1, 'Right Leg': 1 },
            'Leather Hard': { 'Head': 1, 'Torso': 1, 'Left Arm': 1, 'Right Arm': 1, 'Left Leg': 1, 'Right Leg': 1 },
        };

        const setCookie = (name, value, days = 365) => {
            const date = new Date();
            date.setTime(date.getTime() + (days * 24 * 60 * 60 * 1000));
            document.cookie = name + "=" + encodeURIComponent(value) + ";expires=" + date.toUTCString() + ";path=/";
        };
        const getCookie = (name) => {
            const match = document.cookie.match(new RegExp('(^| )' + name + '=([^;]+)'));
            return match ? decodeURIComponent(match[2]) : null;
        };

        // --- COMPONENTS ---

        const DiceRoller = () => {
            const [numDice, setNumDice] = useState(5);
            const [diceResults, setDiceResults] = useState([]);
            const [matches, setMatches] = useState([]);

            const rollDice = () => {
                const results = Array(numDice).fill(0).map(() => Math.floor(Math.random() * 10) + 1);
                setDiceResults(results);
                const counts = {};
                results.forEach(die => { counts[die] = (counts[die] || 0) + 1; });
                const foundMatches = Object.entries(counts)
                    .filter(([_, count]) => count >= 2)
                    .map(([number, count]) => ({ count, number: parseInt(number), display: `${count}x${number}` }))
                    .sort((a, b) => b.count !== a.count ? b.count - a.count : b.number - a.number);
                setMatches(foundMatches);
            };

            return (
                <div className="module-card">
                    <h2>🎲 Dice Roller 🎲 </h2>
                    <div className="input-section">
                        <label>Number of Dice:</label>
                        <input type="number" min="1" max="20" value={numDice} onChange={(e) => setNumDice(Math.max(1, parseInt(e.target.value) || 1))} />
                        <button className="action-btn" onClick={rollDice}>Roll</button>
                    </div>
                    {diceResults.length > 0 && (
                        <div>
                            <div className="all-dice">
                                {diceResults.map((die, idx) => (
                                    <div key={idx} className={`die ${matches.some(m => m.number === die) ? 'matched' : ''}`}>{die}</div>
                                ))}
                            </div>
                            <div className="matches-section">
                                {matches.length > 0 ? matches.map((m, i) => <span key={i} className="match-result">{m.display}</span>) : <span>No matches</span>}
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const HealingRoller = () => {
            const [numDice, setNumDice] = useState(3);
            const [diceResults, setDiceResults] = useState([]);
            const [matches, setMatches] = useState([]);

            const rollHealing = () => {
                const results = Array(numDice).fill(0).map(() => Math.floor(Math.random() * 10) + 1);
                setDiceResults(results);
                const counts = {};
                results.forEach(die => { counts[die] = (counts[die] || 0) + 1; });
                
                const foundMatches = Object.entries(counts)
                    .filter(([_, count]) => count >= 2)
                    .map(([number, count]) => ({ width: count, height: parseInt(number) }))
                    .sort((a, b) => b.width !== a.width ? b.width - a.width : b.height - a.height);
                setMatches(foundMatches);
            };

            return (
                <div className="module-card">
                    <h2>🩹 Healing Roll 🩹</h2>
                    <div className="input-section">
                        <label>Dice Pool (Body + Vigor):</label>
                        <input type="number" min="1" max="20" value={numDice} onChange={(e) => setNumDice(Math.max(1, parseInt(e.target.value) || 1))} />
                        <button className="action-btn" onClick={rollHealing}>Roll</button>
                    </div>
                    {diceResults.length > 0 && (
                        <div>
                            <div className="all-dice" style={{marginBottom: '10px'}}>
                                {diceResults.map((die, idx) => (
                                    <div key={idx} className={`die ${matches.some(m => m.height === die) ? 'matched' : ''}`} style={{width: '35px', height: '35px', fontSize: '1.2em'}}>{die}</div>
                                ))}
                            </div>
                            <div className="matches-section">
                                {matches.length > 0 ? matches.map((m, i) => (
                                    <span key={i} className="healing-result">
                                        Set {m.width}x{m.height}: Heals {m.width} Shock OR Convert 1 Killing to Shocking
                                    </span>
                                )) : <span>No successful healing sets</span>}
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const HitLocation = ({ name, number, wounds, onWoundChange }) => {
            const isCrippled = wounds.length > 0 && wounds.every(w => w === 'killing');
            const handleBoxClick = (index) => {
                const newWounds = [...wounds];
                if (!newWounds[index]) newWounds[index] = 'shock';
                else if (newWounds[index] === 'shock') newWounds[index] = 'killing';
                else newWounds[index] = null;
                onWoundChange(name, newWounds);
            };
            
            return (
                <div className={`hit-location ${isCrippled ? 'crippled' : ''}`}>
                    <div className="location-header">
                        <div className="location-name">
                            {name} {isCrippled && <span className="crippled-warning">Crippled</span>}
                        </div>
                        <div className="location-number">{number}</div>
                    </div>
                    <div className="boxes">
                        {wounds.map((ws, i) => (
                            <div key={i} className={`box ${ws ? `filled ${ws}` : ''}`} onClick={() => handleBoxClick(i)}>
                                {ws === 'shock' ? 'S' : ws === 'killing' ? 'K' : ''}
                            </div>
                        ))}
                    </div>
                </div>
            );
        };

        const App = () => {
            const [theme, setTheme] = useState(() => getCookie('oreTheme') || 'alliance');
            const [selectedRace, setSelectedRace] = useState(() => getCookie('selectedRace') || 'Human');
            const [selectedAdvantages, setSelectedAdvantages] = useState(() => {
                try { return JSON.parse(getCookie('selectedAdvantages')) || []; } 
                catch (e) { return []; }
            });
            
            const getTargetBoxes = (loc, race, advs) => {
                const raceMod = raceModifiers[race]?.[loc] || 0;
                const advMod = advs.reduce((sum, a) => sum + (advantageModifiers[a]?.[loc] || 0), 0);
                return Math.max(1, baseHitboxes[loc] + raceMod + advMod);
            };

            const getInitialHitLocations = (race = 'Human', advs = []) => {
                return {
                    'Head': { number: '10', wounds: Array(getTargetBoxes('Head', race, advs)).fill(null) },
                    'Torso': { number: '7-9', wounds: Array(getTargetBoxes('Torso', race, advs)).fill(null) },
                    'Left Arm': { number: '5-6', wounds: Array(getTargetBoxes('Left Arm', race, advs)).fill(null) },
                    'Right Arm': { number: '3-4', wounds: Array(getTargetBoxes('Right Arm', race, advs)).fill(null) },
                    'Left Leg': { number: '2', wounds: Array(getTargetBoxes('Left Leg', race, advs)).fill(null) },
                    'Right Leg': { number: '1', wounds: Array(getTargetBoxes('Right Leg', race, advs)).fill(null) }
                };
            };

            const [hitLocations, setHitLocations] = useState(() => {
                try {
                    const saved = getCookie('reignWounds');
                    if (saved) return JSON.parse(saved);
                } catch (e) { console.error('Error loading:', e); }
                return getInitialHitLocations(selectedRace, selectedAdvantages);
            });

            useEffect(() => {
                setCookie('reignWounds', JSON.stringify(hitLocations));
                setCookie('selectedRace', selectedRace);
                setCookie('selectedAdvantages', JSON.stringify(selectedAdvantages));
                setCookie('oreTheme', theme);
            }, [hitLocations, selectedRace, selectedAdvantages, theme]);

            // STATUS LOGIC
            const headWounds = hitLocations['Head']?.wounds || [];
            const torsoWounds = hitLocations['Torso']?.wounds || [];
            const isFull = (arr) => arr.length > 0 && arr.every(w => w !== null);
            const isAllKilling = (arr) => arr.length > 0 && arr.every(w => w === 'killing');
            const isDead = isAllKilling(headWounds) || isAllKilling(torsoWounds);
            const isKnockedOut = !isDead && isFull(headWounds); 
            const hasPenalty = !isDead && !isKnockedOut && isFull(torsoWounds);

            const updateHitboxArrays = (newRace, newAdvs) => {
                setHitLocations(prev => {
                    const updated = { ...prev };
                    Object.keys(updated).forEach(loc => {
                        const target = getTargetBoxes(loc, newRace, newAdvs);
                        const current = updated[loc].wounds || [];
                        if (current.length < target) {
                            updated[loc].wounds = [...current, ...Array(target - current.length).fill(null)];
                        } else if (current.length > target) {
                            updated[loc].wounds = current.slice(0, target);
                        }
                    });
                    return updated;
                });
            };

            const handleRaceChange = (e) => {
                const newRace = e.target.value;
                setSelectedRace(newRace);
                updateHitboxArrays(newRace, selectedAdvantages);
            };

            const handleAdvantageToggle = (adv) => {
                const newAdvs = selectedAdvantages.includes(adv) 
                    ? selectedAdvantages.filter(a => a !== adv)
                    : [...selectedAdvantages, adv];
                
                setSelectedAdvantages(newAdvs);
                updateHitboxArrays(selectedRace, newAdvs);
            };

            return (
                <div className={`app-wrapper theme-${theme}`}>
                    <div className="container">
                        <h1>Reign: Warcraft</h1>
                        <div className="subtitle">Wound Tracker</div>

                        <div className="theme-toggle-container">
                            <span className={`theme-label ${theme === 'alliance' ? 'active' : ''}`}>Alliance</span>
                            <label className="switch">
                                <input type="checkbox" checked={theme === 'horde'} onChange={() => setTheme(theme === 'alliance' ? 'horde' : 'alliance')} />
                                <span className="slider round"></span>
                            </label>
                            <span className={`theme-label ${theme === 'horde' ? 'active' : ''}`}>Horde</span>
                        </div>

                        {/* STATUS BANNERS */}
                        {isDead && <div className="notification-banner banner-dead">☠️ Status: DEAD ☠️</div>}
                        {isKnockedOut && <div className="notification-banner banner-ko">💫 Status: KNOCKED OUT 💫</div>}
                        {hasPenalty && <div className="notification-banner banner-penalty">⚠️ Status: DAZED (-1d Penalty) ⚠️</div>}

                        <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(300px, 1fr))', gap: '20px' }}>
                            <DiceRoller />
                            <HealingRoller />
                        </div>

                        <div className="controls-row">
                            <label>Character Race:</label>
                            <select value={selectedRace} onChange={handleRaceChange}>
                                {Object.keys(raceModifiers).map(r => <option key={r} value={r}>{r}</option>)}
                            </select>
                        </div>

                        <div className="advantages-section">
                            <h3>Physical Advantages</h3>
                            <div className="checkbox-group">
                                {Object.keys(advantageModifiers).map(adv => (
                                    <label key={adv} className="checkbox-label">
                                        <input 
                                            type="checkbox" 
                                            checked={selectedAdvantages.includes(adv)}
                                            onChange={() => handleAdvantageToggle(adv)}
                                        />
                                        {adv}
                                    </label>
                                ))}
                            </div>
                        </div>
                        
                        {Object.entries(hitLocations).map(([name, data]) => (
                            <HitLocation key={name} name={name} number={data.number} wounds={data.wounds} 
                                onWoundChange={(loc, w) => setHitLocations(p => ({...p, [loc]: {...p[loc], wounds: w}}))} 
                            />
                        ))}
                        
                        <div className="legend">
                            <div className="legend-item"><div className="legend-box shock"></div><span>Shock Damage</span></div>
                            <div className="legend-item"><div className="legend-box killing"></div><span>Killing Damage</span></div>
                        </div>
                        
                        <div className="controls">
                            <button className="reset-btn" onClick={() => { if(window.confirm('Clear all wounds?')) setHitLocations(getInitialHitLocations(selectedRace, selectedAdvantages)) }}>Clear All</button>
                            <button className="save-btn" onClick={() => {
                                const a = document.createElement('a');
                                a.href = URL.createObjectURL(new Blob([JSON.stringify({race: selectedRace, advantages: selectedAdvantages, locations: hitLocations})], {type: 'application/json'}));
                                a.download = `wounds-${selectedRace}.json`;
                                a.click();
                            }}>Save</button>
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
